name: 每周自动下载外刊并同步至腾讯云COS

on:
  workflow_dispatch:          # 允许手动触发
  schedule:
    - cron: '0 18 * * 5'      # 北京时间每周六凌晨2点运行

env:
  TZ: Asia/Shanghai

jobs:
  sync-magazines:
    runs-on: ubuntu-latest
    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 安装COS命令行工具
        run: sudo pip install coscmd

      - name: 配置COS连接
        run: |
          coscmd config -a ${{ secrets.COS_SECRET_ID }} \
                        -s ${{ secrets.COS_SECRET_KEY }} \
                        -b ${{ secrets.COS_BUCKET }} \
                        -r ${{ secrets.COS_REGION }}

      - name: 下载并上传最新期刊
        run: |
          # 杂志列表 (本地显示名|仓库文件夹名)
          declare -A MAGAZINES=(
            ["经济学人"]="01_economist"
            ["纽约客"]="02_new_yorker"
            ["大西洋月刊"]="04_atlantic"
            ["连线"]="05_wired"
          )
          
          for name in "${!MAGAZINES[@]}"; do
            path="${MAGAZINES[$name]}"
            echo ">>> 正在处理: $name"
            
            # 获取最新一期文件夹名
            latest_dir=$(curl -s "https://api.github.com/repos/hehonghui/awesome-english-ebooks/contents/$path" | grep -oP '"name": "\K[0-9]{4}\.[0-9]{2}\.[0-9]{2}' | head -n1)
            
            if [ -z "$latest_dir" ]; then
              echo "未找到 $name 的最新目录"
              continue
            fi
            
            echo "最新期数: $latest_dir"
            
            # 创建临时目录
            mkdir -p "./temp/$name"
            
            # 下载三种格式
            for ext in epub mobi pdf; do
              file_url="https://raw.githubusercontent.com/hehonghui/awesome-english-ebooks/main/$path/$latest_dir/$name.$latest_dir.$ext"
              curl -L -f -o "./temp/$name/$name.$latest_dir.$ext" "$file_url" || echo "文件 $ext 不存在，跳过"
            done
            
            # 上传到COS (路径: /外文电子期刊下载/经济学人/文件名)
            coscmd upload -r "./temp/$name/" "/外文电子期刊下载/$name/" --ignore "*" --include "*.epub" --include "*.mobi" --include "*.pdf"
            
            # 清理
            rm -rf "./temp/$name"
            echo ">>> $name 处理完成"
          done
          
          echo "所有杂志同步任务结束"
