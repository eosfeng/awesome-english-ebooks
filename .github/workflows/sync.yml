name: 每周自动下载外刊并同步至腾讯云COS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 5'

env:
  TZ: Asia/Shanghai

jobs:
  sync-magazines:
    runs-on: ubuntu-latest
    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 安装COS命令行工具
        run: sudo pip install coscmd

      - name: 配置COS连接
        run: |
          coscmd config -a ${{ secrets.COS_SECRET_ID }} \
                        -s ${{ secrets.COS_SECRET_KEY }} \
                        -b ${{ secrets.COS_BUCKET }} \
                        -r ${{ secrets.COS_REGION }}

      - name: 下载并上传最新期刊
        run: |
          declare -A MAGAZINES=(
            ["经济学人"]="01_economist"
            ["纽约客"]="02_new_yorker"
            ["大西洋月刊"]="04_atlantic"
            ["连线"]="05_wired"
          )
          
          for name in "${!MAGAZINES[@]}"; do
            path="${MAGAZINES[$name]}"
            echo ">>> 正在处理: $name"
            
            # 修复版：兼容 GitHub Actions 环境
            latest_dir=$(curl -s "https://api.github.com/repos/hehonghui/awesome-english-ebooks/contents/$path" | grep -o '"name": "[0-9]\{4\}\.[0-9]\{2\}\.[0-9]\{2\}' | head -n1 | sed 's/"name": "//' | sed 's/"//')
            
            if [ -z "$latest_dir" ]; then
              echo "未找到 $name 的最新目录"
              continue
            fi
            
            echo "最新期数: $latest_dir"
            
            mkdir -p "./temp/$name"
            
            for ext in epub mobi pdf; do
              file_url="https://raw.githubusercontent.com/hehonghui/awesome-english-ebooks/main/$path/$latest_dir/$name.$latest_dir.$ext"
              echo "下载: $file_url"
              curl -L -f -o "./temp/$name/$name.$latest_dir.$ext" "$file_url" || echo "文件 $ext 不存在，跳过"
            done
            
            coscmd upload -r "./temp/$name/" "/外文电子期刊下载/$name/" --ignore "*" --include "*.epub" --include "*.mobi" --include "*.pdf"
            
            rm -rf "./temp/$name"
            echo ">>> $name 处理完成"
          done
          
          echo "所有杂志同步任务结束"
